name: Generate Appcast XML

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g., v0.9.3)'
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "appcast"
  cancel-in-progress: false

env:
  TAG_NAME: ${{ inputs.tag_name || github.event.release.tag_name }}
  DOWNLOAD_BASE: https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag_name || github.event.release.tag_name }}

jobs:
  publish-appcast:
    name: Generate Appcast XML
    runs-on: ubuntu-latest
    
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create local directories for binaries
        run: mkdir -p binaries/windows binaries/macos

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ env.TAG_NAME }}" \
            --pattern "DifferenceEngine-windows.zip" \
            --dir binaries/windows

          gh release download "${{ env.TAG_NAME }}" \
            --pattern "DifferenceEngine-macos.zip" \
            --dir binaries/macos

      - name: Install NetSparkle AppCast Generator
        run: dotnet tool install --global NetSparkleUpdater.Tools.AppCastGenerator

      - name: Generate/Update AppCast XML
        run: |
          VERSION="${TAG_NAME#v}"

          mkdir -p appcast
          # Download existing appcast files from GitHub Pages so --reparse-existing can append to them
          curl -s -L -f -o appcast/appcast.xml "https://talking-birds.github.io/difference-engine-controller-downloads/appcast.xml" || echo "No existing appcast.xml found"
          curl -s -L -f -o appcast/appcast.xml.signature "https://talking-birds.github.io/difference-engine-controller-downloads/appcast.xml.signature" || echo "No existing appcast.xml.signature found"

          for OS in windows macos; do
            netsparkle-generate-appcast \
              -b "binaries/$OS" \
              -n "The Difference Engine" \
              -a appcast \
              -o "$OS" \
              -e zip \
              --file-version "$VERSION" \
              --reparse-existing \
              --signature-file-extension signature \
              -u "$DOWNLOAD_BASE" \
              --private-key-override "${{ secrets.NETSPARKLE_PRIVATE_KEY }}" \
              --public-key-override "${{ vars.NETSPARKLE_PUBLIC_KEY }}"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'appcast'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5